services:
  - type: web
    name: options-hunter
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1
    disk:
      name: trades-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
