services:
  - type: web
    name: options-hunter
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1
    disk:
      name: trades-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ACCESS_CODES
        sync: false   # Set in Render dashboard — comma-separated codes, e.g. mypass,alice-abc,bob-xyz

  - type: worker
    name: options-hunter-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python discord_bot.py
    disk:
      name: bot-trades-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: DISCORD_TOKEN
        sync: false   # Set in Render dashboard
      - key: DISCORD_GUILD_ID
        sync: false   # Optional — set for instant command sync
      - key: SIGNAL_CHANNEL_ID
        sync: false   # Channel ID where signals are posted
      - key: SCAN_INTERVAL_MINUTES
        value: '1'
