<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0b0e14"/>
<title>Options Hunter</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0b0e14;--surface:#131720;--border:#1e2535;--text:#c9d1e0;--muted:#5a6480;--green:#00d084;--red:#ff4d6a;--yellow:#ffc107;--blue:#4d9fff;--gold:#ffd700;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}
.mono{font-family:'JetBrains Mono',monospace;}

/* ── NAV ── */
.app-nav{background:#0d1018;border-bottom:2px solid var(--border);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100;}
.logo{font-size:1.1rem;font-weight:700;color:#fff;padding:14px 20px 14px 0;border-right:1px solid var(--border);margin-right:8px;white-space:nowrap;flex-shrink:0;}
.logo span{color:var(--blue);}
.nav-tabs-oh{display:flex;gap:2px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.nav-tabs-oh::-webkit-scrollbar{display:none;}
.nav-tab{padding:14px 18px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-size:13px;font-weight:500;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:#fff;border-bottom-color:var(--blue);}
.nav-tab .tab-icon{margin-right:6px;}
@media(max-width:600px){.logo{font-size:.95rem;padding:12px 12px 12px 0;margin-right:6px;}.nav-tab{padding:12px 13px;font-size:12px;}.nav-tab .tab-icon{margin-right:4px;}}

/* ── TAB CONTENT ── */
.tab-content-oh{display:none;}.tab-content-oh.active{display:block;}

/* ── CARDS ── */
.oh-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;}
.oh-card-title{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:12px;font-weight:600;}

/* ── METRIC PILLS ── */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.metric-pill{background:#0b0e14;border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.metric-pill .mp-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.metric-pill .mp-value{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;}
.metric-pill .mp-change{font-size:11px;margin-top:2px;}
.pos{color:var(--green);}.neg{color:var(--red);}.neut{color:var(--muted);}

/* ── MOVERS ── */
.mover-list{display:flex;flex-direction:column;gap:6px;}
.mover-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#0b0e14;border-radius:6px;border-left:3px solid transparent;}
.mover-item.gainer{border-left-color:var(--green);}
.mover-item.loser{border-left-color:var(--red);}

/* ── STATE BOX ── */
.state-box{text-align:center;padding:40px 20px;color:var(--muted);}
.state-box .icon{font-size:3rem;margin-bottom:16px;opacity:.7;}
.state-box .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;margin:0 auto 20px;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0);}100%{transform:rotate(360deg);}}

/* ── BUTTONS ── */
.btn-primary-oh{background:var(--blue);border:1px solid var(--blue);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-primary-oh:hover{background:#2a7fff;}
.btn-outline-oh{background:transparent;border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-outline-oh:hover{background:var(--surface);border-color:var(--blue);}
.btn-sm-oh{padding:6px 12px;font-size:12px;}

/* ── TOAST ── */
#toastWrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;color:#fff;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;max-width:90%;}

/* ── PAGE CONTAINER ── */
.page-container{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));}
.table-wrap{padding-bottom:max(80px,calc(env(safe-area-inset-bottom)+60px));}

/* Minimum touch target 44×44 pt (Apple HIG) */
.nav-tab,.btn-primary-oh,.btn-outline-oh,.btn-sm-oh,
.filter-btn,.bh-refresh{min-height:44px;display:inline-flex;align-items:center;justify-content:center;}

/* Inputs — prevent iOS zoom on focus (font-size ≥ 16px stops zoom) */
.oh-input,.oh-select,.wl-input{font-size:16px;padding:12px 14px;background:#0b0e14;border:1px solid var(--border);color:#fff;border-radius:10px;width:100%;}
.oh-input:focus,.oh-select:focus,.wl-input:focus{outline:none;border-color:var(--blue);}

/* ── Nav tabs: icon-only on small phones ── */
@media(max-width:480px){.tab-text{display:none;}.tab-icon{margin-right:0;font-size:18px;}.nav-tab{padding:0 16px;}.logo{font-size:.9rem;}}

/* ── Touch :active states (iOS doesn't fire :hover) ── */
.btn-primary-oh:active{background:#2a7fff;transform:scale(.98);}
.btn-outline-oh:active{background:var(--blue);color:#fff;}
.filter-btn:active{border-color:var(--blue);color:var(--blue);}
.bh-refresh:active{border-color:var(--blue);color:var(--blue);}
.nav-tab:active{color:var(--text);}
.setup-card:active{border-color:var(--blue);background:#0d1525;}
.sector-card:active{border-color:var(--blue);transform:translateY(-1px);}
.setup-btn:active{background:var(--blue);color:#fff;}
.osc-tf-btn:active{background:var(--blue);border-color:var(--blue);color:#fff;}
.news-card:active{border-color:var(--blue);border-left-color:var(--blue);}

/* ── Sector cards ── */
.sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:0 20px 20px;}
.sector-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;}
.sector-card:hover{border-color:var(--blue);}
.sector-card.selected{border-color:var(--blue);background:rgba(77,159,255,.07);}
.sector-card.bull-card{border-color:var(--green);background:rgba(0,208,132,.04);}
.sector-card.bear-card{border-color:var(--red);background:rgba(255,77,106,.04);}
.sc-etf{font-size:18px;font-weight:700;color:#fff;margin-bottom:2px;}
.sc-name{font-size:11px;color:var(--muted);margin-bottom:8px;}
.sc-score{font-size:24px;font-weight:800;margin-bottom:4px;}
.sc-dir{font-size:11px;font-weight:600;margin-bottom:8px;}
.sc-price{font-size:13px;color:#fff;margin-bottom:2px;}
.sc-components{font-size:10px;color:var(--muted);line-height:1.4;}

/* ── Setup cards ── */
.setups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:0 20px 20px;}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;}
.setup-card:hover{border-color:var(--blue);}
.setup-card.call-setup{border-left:4px solid var(--green);}
.setup-card.put-setup{border-left:4px solid var(--red);}
.setup-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.setup-ticker{font-size:18px;font-weight:700;color:#fff;}
.setup-score-bull{background:rgba(0,208,132,.12);color:var(--green);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.setup-score-bear{background:rgba(255,77,106,.12);color:var(--red);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.setup-dir-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;}
.dir-call{background:rgba(0,208,132,.12);color:var(--green);}
.dir-put{background:rgba(255,77,106,.12);color:var(--red);}
.setup-components{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--muted);margin-bottom:12px;}
.setup-btn{background:var(--blue);border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;width:100%;transition:all .2s;}
.setup-btn:hover{background:#2a7fff;}

/* ── Contract recommendation cards ── */
.contract-rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:0 20px 20px;}
.contract-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.contract-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.contract-card-title{font-size:14px;font-weight:700;color:#fff;}
.contract-card-grade{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;}
.grade-Ap{background:rgba(0,208,132,.15);color:var(--green);border:1px solid rgba(0,208,132,.3);}
.grade-A{background:rgba(0,208,132,.1);color:var(--green);border:1px solid rgba(0,208,132,.2);}
.grade-Bp{background:rgba(77,159,255,.15);color:var(--blue);border:1px solid rgba(77,159,255,.3);}
.grade-B{background:rgba(77,159,255,.1);color:var(--blue);border:1px solid rgba(77,159,255,.2);}
.grade-C{background:rgba(255,193,7,.1);color:var(--yellow);border:1px solid rgba(255,193,7,.2);}
.grade-D{background:rgba(255,77,106,.1);color:var(--red);border:1px solid rgba(255,77,106,.2);}
.cr-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;}
.cr-stat{display:flex;flex-direction:column;}
.cr-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.cr-stat-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;}
.cr-reasons{font-size:11px;color:var(--text);line-height:1.5;margin-bottom:12px;}
.btn-simulate{background:rgba(77,159,255,.1);border:1px solid var(--blue);color:var(--blue);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;width:100%;transition:all .2s;}
.btn-simulate:hover{background:var(--blue);color:#fff;}

/* ── Paper trading ── */
.pt-entry-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;max-width:400px;margin:30px auto;text-align:center;}
.pt-entry-input{width:100%;padding:12px 16px;background:#0b0e14;border:1px solid var(--border);color:#fff;border-radius:8px;font-size:16px;margin:16px 0;}
.pt-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.pt-card.status-active{border-left:4px solid var(--blue);}
.pt-card.status-closed{border-left:4px solid var(--muted);}
.pt-card.status-expired{border-left:4px solid var(--red);}
.pt-card-header{margin-bottom:12px;}
.pt-ticker{font-size:16px;font-weight:700;color:#fff;}
.pt-type-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;}
.pt-status-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;}
.pt-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:12px;}
.pt-stat{display:flex;flex-direction:column;}
.pt-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.pt-stat-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;}
.pt-actions{display:flex;gap:8px;margin-top:12px;}
.pt-btn-refresh{background:rgba(77,
